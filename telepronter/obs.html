<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teleprompter OBS</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; background: #000; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        #prompterText { position: absolute; left: 0; width: 100%; padding: 50px 60px; line-height: 1.5; color: #fff; text-align: center; white-space: pre-wrap; font-size: 60px; font-weight: bold; will-change: transform; }
        #estado { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; font-family: monospace; font-size: 1.3rem; text-align: center; }
        .sala-info { color: #00ff88; font-size: 1.5rem; margin-top: 10px; }
        .error { color: #ff4444; }
        .waiting { color: #ffcc00; }
    </style>
</head>
<body>
    <div id="estado">
        <div id="msg">Conectando...</div>
        <div class="sala-info" id="salaInfo"></div>
    </div>
    <div id="prompterText"></div>

<script>
    const params = new URLSearchParams(window.location.search);
    const sala = params.get('sala');
    const estadoMsg = document.getElementById('msg');
    const salaInfo = document.getElementById('salaInfo');
    const textoEl = document.getElementById('prompterText');

    if (!sala) {
        estadoMsg.innerHTML = '<span class="error">❌ Falta ?sala= en la URL</span>';
        throw new Error('Sala no especificada');
    }
    salaInfo.textContent = 'Sala: ' + sala;

    const peer = new Peer('rec-' + sala, { host: '0.peerjs.com', port: 443, path: '/', secure: true });

    peer.on('open', () => {
        estadoMsg.innerHTML = '<span class="waiting">⏳ Esperando controlador...</span>';
    });

    peer.on('connection', (conn) => {
        estadoMsg.style.display = 'none';
        salaInfo.style.display = 'none';

        conn.on('data', (data) => {
            // Actualizar texto
            if (data.texto !== undefined && textoEl.textContent !== data.texto) {
                textoEl.textContent = data.texto;
            }

            // Aplicar estilos
            if (data.tamano) textoEl.style.fontSize = data.tamano + 'px';
            
            // Posición y espejo
            const y = data.posY !== undefined ? data.posY : window.innerHeight;
            if (data.espejo) {
                textoEl.style.transform = `translateY(${y}px) scaleX(-1)`;
            } else {
                textoEl.style.transform = `translateY(${y}px)`;
            }
        });

        conn.on('close', () => {
            estadoMsg.style.display = 'block';
            estadoMsg.innerHTML = '<span class="error">🔌 Controlador desconectado</span>';
        });
    });

    peer.on('error', (err) => {
        if (err.type === 'unavailable-id') {
            estadoMsg.innerHTML = '<span class="error">⚠️ Sala ocupada.<br>Cerrá otras fuentes con esta URL y recargá.</span>';
        } else {
            estadoMsg.innerHTML = '<span class="error">Error: ' + err.message + '</span>';
        }
    });

    peer.on('disconnected', () => {
        estadoMsg.style.display = 'block';
        estadoMsg.innerHTML = '<span class="waiting">🔄 Reconectando...</span>';
        peer.reconnect();
    });
</script>
</body>
</html>
