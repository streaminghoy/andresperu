<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Teleprompter Control</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #000; color: #fff; height: 100vh; overflow: hidden; }
        #editor { padding: 20px; max-width: 600px; margin: 0 auto; height: 100vh; display: flex; flex-direction: column; }
        h1 { font-size: 1.3rem; color: #00d4ff; text-align: center; margin-bottom: 4px; }
        .sub { color: #888; font-size: 0.8rem; text-align: center; margin-bottom: 16px; }
        .card { background: #151515; border: 1px solid #2a2a2a; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
        .sala-code { font-size: 2rem; font-weight: bold; letter-spacing: 4px; color: #00ff88; font-family: monospace; text-align: center; margin: 6px 0; }
        .url-box { background: #000; border: 1px solid #333; border-radius: 8px; padding: 10px; font-size: 0.75rem; color: #aaa; word-break: break-all; margin-bottom: 8px; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 10px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: all 0.2s; }
        .btn-copy { background: #222; color: #fff; border: 1px solid #444; margin-bottom: 8px; font-size: 0.85rem; }
        .btn-primary { background: #00d4ff; color: #000; }
        .btn-primary:active { transform: scale(0.98); }
        textarea { width: 100%; flex: 1; min-height: 100px; background: #0a0a0a; border: 1px solid #333; border-radius: 8px; color: #fff; padding: 12px; font-size: 1rem; resize: none; margin-bottom: 10px; }
        .row { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
        .row label { color: #888; font-size: 0.8rem; display: flex; flex-direction: column; flex: 1; min-width: 100px; }
        .row input[type="range"] { width: 100%; margin-top: 4px; }
        .row select { background: #222; color: #fff; border: 1px solid #444; border-radius: 6px; padding: 6px; margin-top: 4px; }

        #prompter { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100; overflow: hidden; }
        #prompterText { position: absolute; left: 0; width: 100%; padding: 50px 30px; line-height: 1.5; color: #fff; text-align: center; white-space: pre-wrap; will-change: transform; }

        #editorVivo { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 500; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); padding: 20px; flex-direction: column; }
        #editorVivo h2 { color: #00d4ff; font-size: 1.1rem; margin-bottom: 12px; text-align: center; }
        #editorVivo textarea { flex: 1; width: 100%; background: #111; border: 1px solid #333; border-radius: 10px; color: #fff; padding: 16px; font-size: 1.2rem; line-height: 1.5; resize: none; margin-bottom: 12px; }
        .editorBtns { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        .editorBtns button { padding: 14px 24px; border: none; border-radius: 10px; font-size: 1rem; font-weight: 700; cursor: pointer; }
        .btn-save { background: #00ff88; color: #000; }
        .btn-close { background: #444; color: #fff; }

        #controls { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(10,10,10,0.95); border: 1px solid #333; border-radius: 16px; padding: 10px 16px; z-index: 200; display: flex; gap: 8px; align-items: center; backdrop-filter: blur(10px); flex-wrap: wrap; justify-content: center; }
        #controls button { background: #222; color: #fff; border: none; border-radius: 8px; padding: 10px 14px; font-size: 0.8rem; cursor: pointer; }
        #controls button:active { background: #333; }
        #controls label { color: #aaa; font-size: 0.75rem; white-space: nowrap; }

        .status { position: fixed; top: 12px; right: 12px; z-index: 300; padding: 10px 16px; border-radius: 10px; font-size: 0.85rem; font-weight: 600; display: none; }
        .status.live { background: #002211; color: #00ff88; border: 1px solid #004411; }
        .status.waiting { background: #2a2200; color: #ffcc00; border: 1px solid #443300; }
        .status.error { background: #220000; color: #ff5555; border: 1px solid #440000; }
    </style>
</head>
<body>

<div id="editor">
    <h1>📡 Teleprompter Control</h1>
    <p class="sub">Controlá el texto que se ve en OBS</p>
    <div class="card">
        <div style="font-size:0.8rem;color:#888;text-align:center;">Código de sala</div>
        <div class="sala-code" id="salaCode">----</div>
        <div style="font-size:0.75rem;color:#666;text-align:center;margin-bottom:6px;">URL para OBS (fuente Navegador):</div>
        <div class="url-box" id="urlBox">Generando...</div>
        <button class="btn btn-copy" onclick="copiarUrl()">📋 Copiar URL</button>
    </div>
    <textarea id="textoInput" placeholder="Pegá acá el texto de tu guion...">Bienvenidos al programa.
Estamos en vivo desde el estudio.
Gracias por acompañarnos.</textarea>
    <div class="row">
        <label>Velocidad<input type="range" id="velocidad" min="1" max="10" value="3"></label>
        <label>Tamaño fuente<input type="range" id="tamano" min="30" max="120" value="60"></label>
        <label>Espejo<select id="espejo"><option value="no">No</option><option value="si">Sí</option></select></label>
    </div>
    <button class="btn btn-primary" onclick="iniciarTeleprompter()">▶ Iniciar Teleprompter</button>
</div>

<div id="prompter"><div id="prompterText"></div></div>

<div id="editorVivo">
    <h2>✏️ Editar guion en vivo</h2>
    <textarea id="textoVivo"></textarea>
    <div class="editorBtns">
        <button class="btn-save" onclick="guardarEdicion()">💾 Guardar cambios</button>
        <button class="btn-close" onclick="cerrarEditor()">✕ Cerrar sin guardar</button>
    </div>
</div>

<div id="controls" style="display:none;">
    <button onclick="togglePlay()" id="btnPlay">⏸ Pausa</button>
    <button onclick="resetScroll()">⏮ Inicio</button>
    <button onclick="abrirEditorVivo()">✏️ Editar</button>
    <label>Vel: <span id="valVel">3</span></label>
    <button onclick="cambiarVel(-0.5)">-</button>
    <button onclick="cambiarVel(0.5)">+</button>
    <button onclick="salir()">✕ Salir</button>
</div>

<div id="status" class="status"></div>

<script>
    const sala = Math.random().toString(36).substring(2, 8).toUpperCase();
    document.getElementById('salaCode').textContent = sala;
    const baseUrl = window.location.href.substring(0, window.location.href.lastIndexOf('/') + 1);
    const obsUrl = `${baseUrl}obs.html?sala=${sala}`;
    document.getElementById('urlBox').textContent = obsUrl;

    function copiarUrl() {
        navigator.clipboard.writeText(obsUrl).then(() => {
            const btn = document.querySelector('.btn-copy');
            btn.textContent = '✅ URL copiada';
            setTimeout(() => btn.textContent = '📋 Copiar URL', 1500);
        });
    }

    function mostrarEstado(msg, tipo) {
        const el = document.getElementById('status');
        el.textContent = msg;
        el.className = 'status ' + tipo;
        el.style.display = 'block';
        if (tipo !== 'live') setTimeout(() => el.style.display = 'none', 4000);
    }

    /* ===== PEERJS ===== */
    const peer = new Peer('emit-' + sala, { host: '0.peerjs.com', port: 443, path: '/', secure: true });
    let conn = null;
    let conectado = false;

    peer.on('open', () => {
        mostrarEstado('Conectado al servidor. Listo.', 'waiting');
        intentarConectar();
    });

    peer.on('error', (err) => {
        console.error(err);
        mostrarEstado('Error: ' + err.type, 'error');
    });

    function intentarConectar() {
        if (conectado) return;
        conn = peer.connect('rec-' + sala, { reliable: true });
        
        conn.on('open', () => {
            conectado = true;
            mostrarEstado('OBS conectado ✅', 'live');
        });

        conn.on('close', () => {
            conectado = false;
            mostrarEstado('OBS desconectado. Reintentando...', 'waiting');
            setTimeout(intentarConectar, 3000);
        });

        conn.on('error', () => {
            conectado = false;
            setTimeout(intentarConectar, 3000);
        });
    }

    function enviarDatos() {
        if (!conectado || !conn) return;
        conn.send({
            texto: textoActual,
            posY: posY,
            velocidad: vel,
            tamano: parseInt(document.getElementById('tamano').value),
            espejo: document.getElementById('espejo').value === 'si',
            estado: scrolling ? 'play' : 'pause'
        });
    }

    /* ===== TELEPROMPTER ===== */
    let scrolling = false, posY = 0, vel = 3, animFrame;
    let textoActual = '';
    let syncInterval = null;

    function iniciarTeleprompter() {
        textoActual = document.getElementById('textoInput').value;
        if (!textoActual.trim()) return alert('Escribí algo de texto primero');

        vel = parseFloat(document.getElementById('velocidad').value);
        const tam = parseInt(document.getElementById('tamano').value);
        const espejo = document.getElementById('espejo').value === 'si';

        document.getElementById('editor').style.display = 'none';
        document.getElementById('prompter').style.display = 'block';
        document.getElementById('controls').style.display = 'flex';

        const el = document.getElementById('prompterText');
        el.textContent = textoActual;
        el.style.fontSize = tam + 'px';
        if (espejo) el.style.transform = 'scaleX(-1)';

        posY = window.innerHeight;
        aplicarTransform();
        scrolling = true;
        scrollLoop();

        document.getElementById('valVel').textContent = vel;

        // Enviar estado cada 100ms
        syncInterval = setInterval(enviarDatos, 100);
    }

    function aplicarTransform() {
        const espejo = document.getElementById('espejo').value === 'si';
        const el = document.getElementById('prompterText');
        el.style.transform = espejo ? `translateY(${posY}px) scaleX(-1)` : `translateY(${posY}px)`;
    }

    function scrollLoop() {
        if (!scrolling) return;
        posY -= vel;
        aplicarTransform();
        const el = document.getElementById('prompterText');
        if (posY < -el.offsetHeight - 200) { scrolling = false; return; }
        animFrame = requestAnimationFrame(scrollLoop);
    }

    function togglePlay() {
        scrolling = !scrolling;
        document.getElementById('btnPlay').textContent = scrolling ? '⏸ Pausa' : '▶ Play';
        if (scrolling) scrollLoop();
    }

    function resetScroll() {
        posY = window.innerHeight;
        if (!scrolling) {
            scrolling = true;
            document.getElementById('btnPlay').textContent = '⏸ Pausa';
            scrollLoop();
        }
    }

    function cambiarVel(delta) {
        vel = Math.max(0.5, Math.min(15, vel + delta));
        document.getElementById('valVel').textContent = vel.toFixed(1);
    }

    function salir() {
        scrolling = false;
        cancelAnimationFrame(animFrame);
        clearInterval(syncInterval);
        if (conn) conn.close();
        document.getElementById('editor').style.display = 'flex';
        document.getElementById('prompter').style.display = 'none';
        document.getElementById('controls').style.display = 'none';
    }

    function abrirEditorVivo() {
        document.getElementById('textoVivo').value = textoActual;
        document.getElementById('editorVivo').style.display = 'flex';
    }

    function guardarEdicion() {
        textoActual = document.getElementById('textoVivo').value;
        document.getElementById('prompterText').textContent = textoActual;
        document.getElementById('editorVivo').style.display = 'none';
    }

    function cerrarEditor() {
        document.getElementById('editorVivo').style.display = 'none';
    }
</script>
</body>
</html>
