<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Teleprompter → OBS</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #000; color: #fff; height: 100vh; overflow: hidden;
        }

        /* ===== MODO EDITOR INICIAL ===== */
        #editor {
            padding: 20px; max-width: 600px; margin: 0 auto;
            height: 100vh; display: flex; flex-direction: column;
        }
        h1 { font-size: 1.3rem; color: #00d4ff; text-align: center; margin-bottom: 4px; }
        .sub { color: #888; font-size: 0.8rem; text-align: center; margin-bottom: 16px; }

        .card {
            background: #151515; border: 1px solid #2a2a2a;
            border-radius: 12px; padding: 16px; margin-bottom: 12px;
        }
        .sala-code {
            font-size: 2rem; font-weight: bold; letter-spacing: 4px;
            color: #00ff88; font-family: monospace; text-align: center; margin: 6px 0;
        }
        .url-box {
            background: #000; border: 1px solid #333; border-radius: 8px;
            padding: 10px; font-size: 0.75rem; color: #aaa;
            word-break: break-all; margin-bottom: 8px;
        }
        .btn {
            width: 100%; padding: 14px; border: none; border-radius: 10px;
            font-size: 1rem; font-weight: 700; cursor: pointer; transition: all 0.2s;
        }
        .btn-copy { background: #222; color: #fff; border: 1px solid #444; margin-bottom: 8px; font-size: 0.85rem; }
        .btn-primary { background: #00d4ff; color: #000; }
        .btn-primary:active { transform: scale(0.98); }

        textarea {
            width: 100%; flex: 1; min-height: 100px;
            background: #0a0a0a; border: 1px solid #333; border-radius: 8px;
            color: #fff; padding: 12px; font-size: 1rem; resize: none; margin-bottom: 10px;
        }
        .row { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
        .row label { color: #888; font-size: 0.8rem; display: flex; flex-direction: column; flex: 1; min-width: 100px; }
        .row input[type="range"] { width: 100%; margin-top: 4px; }
        .row select {
            background: #222; color: #fff; border: 1px solid #444;
            border-radius: 6px; padding: 6px; margin-top: 4px;
        }

        /* ===== MODO TELEPROMPTER ===== */
        #prompter {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: #000; z-index: 100;
            overflow: hidden;
        }
        #prompterText {
            position: absolute; left: 0; width: 100%;
            padding: 50px 30px; line-height: 1.5;
            color: #fff; text-align: center; white-space: pre-wrap;
            will-change: transform;
        }

        /* ===== EDITOR EN VIVO ===== */
        #editorVivo {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; z-index: 500;
            background: rgba(0,0,0,0.92); backdrop-filter: blur(12px);
            padding: 20px; flex-direction: column;
        }
        #editorVivo h2 { color: #00d4ff; font-size: 1.1rem; margin-bottom: 12px; text-align: center; }
        #editorVivo textarea {
            flex: 1; width: 100%; background: #111; border: 1px solid #333;
            border-radius: 10px; color: #fff; padding: 16px; font-size: 1.1rem;
            line-height: 1.5; resize: none; margin-bottom: 12px;
        }
        .editorBtns {
            display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;
        }
        .editorBtns button {
            padding: 14px 24px; border: none; border-radius: 10px;
            font-size: 1rem; font-weight: 700; cursor: pointer;
        }
        .btn-save { background: #00ff88; color: #000; }
        .btn-save:active { background: #00cc6a; }
        .btn-cancel { background: #444; color: #fff; }
        .btn-cancel:active { background: #555; }

        /* ===== CONTROLES FLOTANTES ===== */
        #controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(10,10,10,0.95); border: 1px solid #333;
            border-radius: 16px; padding: 10px 16px; z-index: 200;
            display: flex; gap: 8px; align-items: center;
            backdrop-filter: blur(10px); flex-wrap: wrap; justify-content: center;
        }
        #controls button {
            background: #222; color: #fff; border: none;
            border-radius: 8px; padding: 10px 14px; font-size: 0.8rem; cursor: pointer;
        }
        #controls button:active { background: #333; }
        #controls label { color: #aaa; font-size: 0.75rem; white-space: nowrap; }

        /* ===== BOTÓN TRANSMITIR ===== */
        #btnTransmitir {
            position: fixed; top: 12px; left: 12px; z-index: 300;
            background: #ff3333; color: #fff; border: none;
            border-radius: 10px; padding: 12px 20px; font-size: 0.9rem;
            font-weight: 700; cursor: pointer; display: none;
        }
        #btnTransmitir.connected { background: #00ff88; color: #000; }

        .status {
            position: fixed; top: 12px; right: 12px; z-index: 300;
            padding: 10px 16px; border-radius: 10px; font-size: 0.85rem; font-weight: 600;
            display: none;
        }
        .status.live { background: #002211; color: #00ff88; border: 1px solid #004411; }
        .status.waiting { background: #2a2200; color: #ffcc00; border: 1px solid #443300; }
        .status.error { background: #220000; color: #ff5555; border: 1px solid #440000; }

        #captureCanvas {
            position: fixed; top: -9999px; left: -9999px;
        }
    </style>
</head>
<body>

<!-- ===== EDITOR INICIAL ===== -->
<div id="editor">
    <h1>📡 Teleprompter → OBS</h1>
    <p class="sub">Escribí tu guion, iniciá y transmití a OBS</p>

    <div class="card">
        <div style="font-size: 0.8rem; color: #888; text-align:center;">Código de sala</div>
        <div class="sala-code" id="salaCode">----</div>
        <div style="font-size: 0.75rem; color: #666; text-align:center; margin-bottom:6px;">URL para OBS (fuente Navegador):</div>
        <div class="url-box" id="urlBox">Generando...</div>
        <button class="btn btn-copy" onclick="copiarUrl()">📋 Copiar URL</button>
    </div>

    <textarea id="textoInput" placeholder="Pegá acá el texto de tu guion...">Bienvenidos al programa.
Estamos en vivo desde el estudio.
Gracias por acompañarnos.</textarea>

    <div class="row">
        <label>Velocidad
            <input type="range" id="velocidad" min="1" max="10" value="3">
        </label>
        <label>Tamaño fuente
            <input type="range" id="tamano" min="30" max="120" value="60">
        </label>
        <label>Espejo
            <select id="espejo">
                <option value="no">No</option>
                <option value="si">Sí (reflector)</option>
            </select>
        </label>
    </div>

    <button class="btn btn-primary" onclick="iniciarTeleprompter()">▶ Iniciar Teleprompter</button>
</div>

<!-- ===== MODO TELEPROMPTER ===== -->
<div id="prompter">
    <div id="prompterText"></div>
</div>

<!-- ===== EDITOR EN VIVO ===== -->
<div id="editorVivo">
    <h2>✏️ Editar guion en vivo</h2>
    <textarea id="textoVivo"></textarea>
    <div class="editorBtns">
        <button class="btn-save" onclick="guardarEdicion()">💾 Guardar y continuar</button>
        <button class="btn-cancel" onclick="cancelarEdicion()">✕ Cancelar</button>
    </div>
</div>

<canvas id="captureCanvas" width="1920" height="1080"></canvas>

<!-- ===== CONTROLES FLOTANTES ===== -->
<div id="controls" style="display:none;">
    <button onclick="togglePlay()" id="btnPlay">⏸ Pausa</button>
    <button onclick="resetScroll()">⏮ Inicio</button>
    <button onclick="abrirEditorVivo()">✏️ Editar</button>
    <label>Vel: <span id="valVel">3</span></label>
    <button onclick="cambiarVel(-0.5)">-</button>
    <button onclick="cambiarVel(0.5)">+</button>
    <button onclick="salir()">✕ Salir</button>
</div>

<button id="btnTransmitir" onclick="toggleTransmitir()">🔴 Transmitir a OBS</button>
<div id="status" class="status"></div>

<script>
    /* ===== SALA Y URL ===== */
    const sala = Math.random().toString(36).substring(2, 8).toUpperCase();
    document.getElementById('salaCode').textContent = sala;
    const baseUrl = window.location.href.substring(0, window.location.href.lastIndexOf('/') + 1);
    const obsUrl = `${baseUrl}obs.html?sala=${sala}`;
    document.getElementById('urlBox').textContent = obsUrl;

    function copiarUrl() {
        navigator.clipboard.writeText(obsUrl).then(() => {
            const btn = document.querySelector('.btn-copy');
            btn.textContent = '✅ URL copiada';
            setTimeout(() => btn.textContent = '📋 Copiar URL', 1500);
        });
    }

    /* ===== TELEPROMPTER ===== */
    let scrolling = false, posY = 0, vel = 3, animFrame;
    let textoActual = '';

    function iniciarTeleprompter() {
        textoActual = document.getElementById('textoInput').value;
        if (!textoActual.trim()) return alert('Escribí algo de texto primero');

        vel = parseFloat(document.getElementById('velocidad').value);
        const tam = document.getElementById('tamano').value;
        const espejo = document.getElementById('espejo').value === 'si';

        document.getElementById('editor').style.display = 'none';
        document.getElementById('prompter').style.display = 'block';
        document.getElementById('controls').style.display = 'flex';
        document.getElementById('btnTransmitir').style.display = 'block';

        const el = document.getElementById('prompterText');
        el.textContent = textoActual;
        el.style.fontSize = tam + 'px';
        if (espejo) el.style.transform = 'scaleX(-1)';

        posY = window.innerHeight;
        aplicarTransform();

        document.getElementById('valVel').textContent = vel;

        setTimeout(() => { scrolling = true; scrollLoop(); }, 800);
    }

    function aplicarTransform() {
        const espejo = document.getElementById('espejo').value === 'si';
        const el = document.getElementById('prompterText');
        el.style.transform = espejo
            ? `translateY(${posY}px) scaleX(-1)`
            : `translateY(${posY}px)`;
    }

    function scrollLoop() {
        if (!scrolling) return;
        posY -= vel;
        aplicarTransform();

        const el = document.getElementById('prompterText');
        if (posY < -el.offsetHeight - 200) { scrolling = false; return; }
        animFrame = requestAnimationFrame(scrollLoop);
    }

    function togglePlay() {
        scrolling = !scrolling;
        document.getElementById('btnPlay').textContent = scrolling ? '⏸ Pausa' : '▶ Play';
        if (scrolling) scrollLoop();
    }

    function resetScroll() {
        posY = window.innerHeight;
        scrolling = true;
        document.getElementById('btnPlay').textContent = '⏸ Pausa';
        scrollLoop();
    }

    function cambiarVel(delta) {
        vel = Math.max(0.5, Math.min(15, vel + delta));
        document.getElementById('valVel').textContent = vel.toFixed(1);
    }

    function salir() {
        scrolling = false;
        cancelAnimationFrame(animFrame);
        detenerTransmision();
        document.getElementById('editor').style.display = 'flex';
        document.getElementById('prompter').style.display = 'none';
        document.getElementById('controls').style.display = 'none';
        document.getElementById('btnTransmitir').style.display = 'none';
        document.getElementById('btnTransmitir').classList.remove('connected');
        document.getElementById('btnTransmitir').textContent = '🔴 Transmitir a OBS';
    }

    /* ===== EDITOR EN VIVO ===== */
    function abrirEditorVivo() {
        scrolling = false;
        document.getElementById('btnPlay').textContent = '▶ Play';
        document.getElementById('textoVivo').value = textoActual;
        document.getElementById('editorVivo').style.display = 'flex';
    }

    function guardarEdicion() {
        textoActual = document.getElementById('textoVivo').value;
        document.getElementById('prompterText').textContent = textoActual;
        document.getElementById('editorVivo').style.display = 'none';
        // El scroll queda pausado, el operador toca Play cuando quiera
    }

    function cancelarEdicion() {
        document.getElementById('editorVivo').style.display = 'none';
        // Vuelve al teleprompter, el scroll sigue pausado
    }

    /* ===== TRANSMISIÓN ===== */
    const canvas = document.getElementById('captureCanvas');
    const ctx = canvas.getContext('2d');
    let streamActivo = null, llamadaActiva = null, transmitiendo = false;
    let renderInterval = null;

    const peer = new Peer(`emit-${sala}`, {
        host: '0.peerjs.com', port: 443, path: '/', secure: true, debug: 1
    });

    peer.on('open', () => console.log('Peer listo:', peer.id));
    peer.on('error', err => {
        console.error(err);
        mostrarEstado('Error de red: ' + err.message, 'error');
    });

    function mostrarEstado(msg, tipo) {
        const el = document.getElementById('status');
        el.textContent = msg;
        el.className = 'status ' + tipo;
        el.style.display = 'block';
        if (tipo !== 'live') setTimeout(() => el.style.display = 'none', 5000);
    }

    function renderCanvas() {
        const w = 1920, h = 1080;
        ctx.fillStyle = '#000000';
        ctx.fillRect(0, 0, w, h);

        const tamBase = parseInt(document.getElementById('tamano').value);
        const fontSize = tamBase * 1.8;
        ctx.fillStyle = '#ffffff';
        ctx.font = `bold ${fontSize}px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif`;
        ctx.textAlign = 'center';

        const espejo = document.getElementById('espejo').value === 'si';
        if (espejo) { ctx.translate(w, 0); ctx.scale(-1, 1); }

        const viewportH = window.innerHeight;
        const escala = w / window.innerWidth;
        const offsetY = (posY - viewportH) * escala + h;

        const lineas = textoActual.split('\n');
        const lineHeight = fontSize * 1.5;
        let y = offsetY;
        const maxW = w * 0.85;

        lineas.forEach(linea => {
            if (linea.trim() === '') { y += lineHeight * 0.5; return; }
            const palabras = linea.split(' ');
            let lineaActual = '';
            palabras.forEach(palabra => {
                const prueba = lineaActual + palabra + ' ';
                if (ctx.measureText(prueba).width > maxW && lineaActual !== '') {
                    ctx.fillText(lineaActual, espejo ? 0 : w / 2, y);
                    y += lineHeight;
                    lineaActual = palabra + ' ';
                } else {
                    lineaActual = prueba;
                }
            });
            ctx.fillText(lineaActual, espejo ? 0 : w / 2, y);
            y += lineHeight;
        });

        if (espejo) ctx.setTransform(1, 0, 0, 1, 0, 0);
    }

    function toggleTransmitir() {
        transmitiendo ? detenerTransmision() : iniciarTransmision();
    }

    function iniciarTransmision() {
        if (!canvas.captureStream) {
            mostrarEstado('Tu navegador no soporta transmisión desde canvas.', 'error');
            return;
        }
        try {
            const stream = canvas.captureStream(30);
            streamActivo = stream;
            renderInterval = setInterval(renderCanvas, 33);

            const receptorId = `rec-${sala}`;
            let call = peer.call(receptorId, stream);
            llamadaActiva = call;

            const btn = document.getElementById('btnTransmitir');
            if (call) {
                conectado(btn);
            } else {
                mostrarEstado('Esperando que OBS cargue la URL...', 'waiting');
                const intv = setInterval(() => {
                    if (!transmitiendo) { clearInterval(intv); return; }
                    const retry = peer.call(receptorId, stream);
                    if (retry) { clearInterval(intv); llamadaActiva = retry; conectado(btn); }
                }, 3000);
                setTimeout(() => clearInterval(intv), 30000);
            }
        } catch (err) {
            mostrarEstado('Error: ' + err.message, 'error');
        }
    }

    function conectado(btn) {
        transmitiendo = true;
        btn.textContent = '✅ Conectado a OBS';
        btn.classList.add('connected');
        mostrarEstado('Transmitiendo a OBS', 'live');
    }

    function detenerTransmision() {
        transmitiendo = false;
        if (renderInterval) clearInterval(renderInterval);
        if (streamActivo) { streamActivo.getTracks().forEach(t => t.stop()); streamActivo = null; }
        if (llamadaActiva) { llamadaActiva.close(); llamadaActiva = null; }
        const btn = document.getElementById('btnTransmitir');
        btn.textContent = '🔴 Transmitir a OBS';
        btn.classList.remove('connected');
        document.getElementById('status').style.display = 'none';
    }
</script>

</body>
</html>
